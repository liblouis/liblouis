# literary braille
display: |
  display \s 0
  include bg.dis
table:
  language: bg
  type: literary
  contraction: no
  dots: 6

tests:

  # Example for dashes in dialogs. Capital Cyrillic letters should be
  # marked with dots 46
  -
    - Добро утро, как си? - Попита той.
    - Àdobro utro, kak si?õ- Àpopita toy.
  -
    - Благодаря, добре съм.
    - Àblagodar$, dobre s[m.

  # Several consecutive capital Cyrillic letters should be marked with
  # dots 56
  -
    - БНТ, ДКМС
    - ôbnt, ôdkms

  # In this table there is not difference between cyrillic and latin
  # letters. They all are capitalized with dots 46 Mixed letters and
  # digits.
  - 
    - 1А2б3C4d
    - ÁaÀaÁbøbÁcÀcÁdõd

# Back-translation must prefer Bulgarian letters for bare cells because the
# first ten Bulgarian letters use the same cells as the digits. Digits are
# still back-translated after the Bulgarian number sign.
flags: {testmode: bothDirections}
tests:
  -
    - абвгдежзийѝклмнопрстуфхцчшщъьюя
    - abwgdejziy&klmnoprstufhcq¸x[]¾$
  -
    - АБВ
    - ôabw
  -
    - а1б2ц3 123 абв
    - aÁaøbÁbøcÁc Áabc abw
  -
    - 1+2
    - Áa!b
  -
    - 1,1
    - Áa,a
  -
    - 1-2
    - Áa-b
  -
    - 1*2
    - Áa*b
  -
    - 1/2
    - Áa^b
  -
    - 1=2
    - Áa=b
  -
    - 1×2
    - ÁaÉb
  -
    - 1÷2
    - Áa.b
  -
    - 1.
    - Áa.
  -
    - –
    - õ-

# Practical symbol additions checked against the Bulgarian Braille-viewer
# profile and real-device testing. Some symbols intentionally translate only
# forward because their braille cells collide with Bulgarian letters or
# punctuation in back-translation.
flags: {testmode: forward}
tests:
  -
    - №1
    - nr.Áa
  -
    - /
    - ^
  -
    - —
    - õ-
  -
    - •
    - õ-
  -
    - ≤
    - <=
  -
    - ∈
    - ø<
  -
    - α
    - óa
  -
    - Ω
    - _w

flags: {testmode: backward}
tests:
  -
    - Àa
    - А
  -
    - À&
    - Ѝ
