display: unicode-without-blank.dis
table:
  language: et
  type: literary
  __assert-match: et-6dot.utb

tests:
  - # All letters of the Estonian alphabet (lowercase)
    - a b c d e f g h i j k l m n o p q r s ЕЎ z Еҫ t u v w Гө ГӨ Г¶ Гј x y
    - в Ғ в ғ в ү в ҷ в ‘ в Ӣ в ӣ в “ в Ҡ в ҡ в … в Ү в Қ в қ в • в Ҹ в ҹ в — в Һ в ұ в ө в ® в һ в Ҙ в § в ә в Ј в ң в Ә в і в ӯ в Ҫ
  - # Uppercase letters (incl. Estonian specials)
    - A Г• Г„ Г– Гң Е  ЕҪ X Y
    - в  в Ғ в  в Ј в  в ң в  в Ә в  в і в  в ұ в  в ® в  в ӯ в  в Ҫ
  - # Pangram
    - PГөdur Zagrebi tЕЎellomГӨngija-fГ¶ljetonist Ciqo kГјlmetas kehvas garaaЕҫis
    - в  в Ҹв Јв ҷв Ҙв — в  в өв Ғв ӣв —в ‘в ғв Ҡ в һв ұв ‘в Үв Үв •в Қв ңв қв ӣв Ҡв ҡв Ғв Өв Ӣв Әв Үв ҡв ‘в һв •в қв Ҡв Һв һ в  в үв Ҡв ҹв • в …в ів Үв Қв ‘в һв Ғв Һ в …в ‘в “в §в Ғв Һ в ӣв Ғв —в Ғв Ғв ®в Ҡв Һ
  - # Lowercase and uppercase pairs
    - aA ГөГ• ГӨГ„ Г¶Г– ГјГң ЕЎЕ  ЕҫЕҪ
    - в Ғв  в Ғ в Јв  в Ј в ңв  в ң в Әв  в Ә в ів  в і в ұв  в ұ в ®в  в ®
  - # All caps words
    - SUURTГ„HED
    - в  в  в Һв Ҙв Ҙв —в һв ңв “в ‘в ҷ
  - # All caps with hyphen
    - Eesti NATO-s
    - в  в ‘в ‘в Һв һв Ҡ в  в  в қв Ғв һв •в Өв Һ
  - # Number-text transitions
    - 123abc abc123 abc123def 123abc456 1km/h
    - в јв Ғв ғв ү в Ғв ғв ү в Ғв ғв үв јв Ғв ғв ү в Ғв ғв үв јв Ғв ғв ү в ҷв ‘в Ӣ в јв Ғв ғв ү в Ғв ғв үв јв ҷв ‘в Ӣ в јв Ғ в …в Қв Ңв “
  - # Apostrophe inside a word
    - "Coats'i Eesti AS"
    - в  в үв •в Ғв һв Һв җв Ҡ в  в ‘в ‘в Һв һв Ҡ в  в  в Ғв Һ
  - # Quotes
    - 'вҖһTere!вҖқ Гјtles ta.'
    - в °в  в һв ‘в —в ‘в –в ° в ів һв Үв ‘в Һ в һв Ғв „
  - # Dates
    - 31.12.1999 1.-15.6.1999 1998-2000
    - в јв үв Ғв „в Ғв ғв „в Ғв Ҡв Ҡв Ҡ в јв Ғв „в Өв јв Ғв ‘в „в Ӣв „в Ғв Ҡв Ҡв Ҡ в јв Ғв Ҡв Ҡв “ в Өв јв ғв ҡв ҡв ҡ
  - # Times
    - 'kell 21.00 kell 12:30 kell 8.15-10.30 24.45,8'
    - в …в ‘в Үв Ү в јв ғв Ғв „в ҡв ҡ в …в ‘в Үв Ү в јв Ғв ғв ’в үв ҡ в …в ‘в Үв Ү в јв “в „в Ғв ‘ в Өв јв Ғв ҡв „в үв ҡ в јв ғв ҷв „в ҷв ‘в Ӯв “
  - # Fractions and division
    - 1/2 3/4 5/2 1 / 2
    - в јв Ғв Ҷ в јв үв І в јв ‘в Ҷ в јв Ғ в Ң в јв ғ
  - # Mixed number and division with lowered denominator
    - 6 2/3 = 20/3
    - в јв Ӣв јв ғв ’ в ¶ в јв ғв ҡв ’
  - # Arithmetic with numbers
    - 5+2 5-2 5вҲ’2 5Г—2 5Г·2
    - в јв ‘ в –в јв ғ в јв ‘ в Өв јв ғ в јв ‘ в Өв јв ғ в јв ‘ в „в јв ғ в јв ‘ в ’в јв ғ
  - # URLs and email addresses
    - http://eesti.ee peaminister@valitsus.ee
    - в “в һв һв Ҹв ’в Ңв Ңв ‘в ‘в Һв һв Ҡв „в ‘в ‘ в Ҹв ‘в Ғв Қв Ҡв қв Ҡв Һв һв ‘в —в Ҳв §в Ғв Үв Ҡв һв Һв Ҙв Һв „в ‘в ‘
  - # Comparison and brackets
    - < > { } (2+3) [ ]
    - в Ә в • в Ә в • в Јв јв ғ в –в јв үв ң в · в ҫ
  - # Additional symbols
    - "В° В§ В· вҖў вӮ¬"
    - в ҙ в ¬ в „ в І в Ҳв ‘
  - # Degree-minute-second notation (Unicode prime signs)
    - 23В°34вҖІ41вҖі
    - в јв ғв ү в ҙв јв үв ҷ в Ёв јв ҷв Ғ в ё
  - # Punctuation and commas (example from the manual)
    - Puuviljad on Гөunad, pirnid ja kirsid.
    - в  в Ҹв Ҙв Ҙв §в Ҡв Үв ҡв Ғв ҷ в •в қ в Јв Ҙв қв Ғв ҷв Ӯ в Ҹв Ҡв —в қв Ҡв ҷ в ҡв Ғ в …в Ҡв —в Һв Ҡв ҷв „
  - # Hyphenated names
    - Marta-Mia
    - в  в Қв Ғв —в һв Ғв Өв  в Қв Ҡв Ғ
  - # Dash with surrounding spaces
    - tahaks вҖ“ lennata jne.
    - в һв Ғв “в Ғв …в Һ в Ө в Үв ‘в қв қв Ғв һв Ғ в ҡв қв ‘в „
  - # Single digits
    - 1 2 3 4 5 6 7 8 9 0
    - в јв Ғ в јв ғ в јв ү в јв ҷ в јв ‘ в јв Ӣ в јв ӣ в јв “ в јв Ҡ в јв ҡ
  - # Numbers in running text
    - 1 Гөun ja 2 pirni
    - в јв Ғ в Јв Ҙв қ в ҡв Ғ в јв ғ в Ҹв Ҡв —в қв Ҡ
  - # Multi-digit number
    - 199
    - в јв Ғв Ҡв Ҡ
  - # Grouped large number with dots
    - 2.050.000.000
    - в јв ғв „в ҡв ‘в ҡв „в ҡв ҡв ҡв „в ҡв ҡв ҡ
  - # Decimal comma
    - 12,34
    - в јв Ғв ғв Ӯв үв ҷ
  - # Roman numerals (caps word)
    - XIV
    - в  в  в ӯв Ҡв §
  - # Degree, percent and per mille (space before the sign)
    - 90В° 50% 12вҖ°
    - в јв Ҡв ҡ в ҙ в јв ‘в ҡ в № в јв Ғв ғ в ’в №
  - # Math operators and relations
    - + вҲ’ Г— Г· / = вү  вүӨ вүҘ вҲһ вҲҡ вүҲ
    - в – в Ө в „ в ’ в Ң в ¶ в җв ¶ в Әв ¶ в •в ¶ в ҝ в © в ёв ¶
  - # Common symbols
    - "@ # % & * ~"
    - в Ҳ в ј в № в Ҝ в ” в ҳ
  - # Punctuation and brackets
    - "' \" , . ? ! ; : ( ) [ ] - вҖ“ вҖ” _ /"
    - в җ в ° в Ӯ в „ в ў в – в Ҷ в ’ в Ұ в ҙ в · в ҫ в Ө в Ө в Ө в Ө в Ң
  - # Greek lowercase letters
    - Оұ ОІ Оі Оҙ Оө О¶ О· Оё О№ Оә О» Ој ОҪ Оҫ Оҝ ПҖ ПҒ ПӮ П„ П… ПҶ ПҮ ПҲ Пү
    - в Ёв Ғ в Ёв ғ в Ёв ӣ в Ёв ҷ в Ёв ‘ в Ёв ө в Ёв ң в Ёв № в Ёв Ҡ в Ёв … в Ёв Ү в Ёв Қ в Ёв қ в Ёв ӯ в Ёв • в Ёв Ҹ в Ёв — в Ёв Һ в Ёв һ в Ёв Ҫ в Ёв Ӣ в Ёв “ в Ёв Ҝ в Ёв ҡ
  - # Greek uppercase letters
    - О‘ О“ Оҳ Оӣ Оһ ОҘ О§ О©
    - в ёв Ғ в ёв ӣ в ёв № в ёв Ү в ёв ӯ в ёв Ҫ в ёв “ в ёв ҡ
  - # Underline (single word)
    - Lapsed mГӨngisid
    - в  в Үв Ғв Ҹв Һв ‘в ҷ в ¬в Қв ңв қв ӣв Ҡв Һв Ҡв ҷ
    - typeform:
        underline: "       ++++++++"
  - # Italic (single word)
    - TГӨna oli vihmane
    - в  в һв ңв қв Ғ в •в Үв Ҡ в Ёв §в Ҡв “в Қв Ғв қв ‘
    - typeform:
        italic: "         +++++++"
  - # Bold (single word)
    - See on tГӨhtis
    - в  в Һв ‘в ‘ в •в қ в ёв һв ңв “в һв Ҡв Һ
    - typeform:
        bold: "       ++++++"
