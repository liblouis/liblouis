  - # All caps phrase
    - VAD S√ДGER DU?
    - в††в††в††в†Ів†Бв†Щ в†Ов†Ьв†Ыв†Св†Ч в†Щв†•в†Ґв†±
  - # Diacritic letters
    - ƒГ ƒЗ …Ц √ђ √≥ ≈£ бЇЕ бЄЭ
    - в†Ив†Б в†ђв†Фв†Й в†Ив†Щ в†ђв†Ґв†К в†ђв†Фв†Х в†£в†Вв†Ю в†ђв†Жв†Ї в†Ив†С

# Spaces
flags: {testmode: forward}
tests:
  - ['\x0009', '\x0020']
  - ['\x000a', '\x0020']
  - ['\x000d', '\x0020']
flags: {testmode: bothDirections}
tests:
  - ['\x0020', ' ']
flags: {testmode: forward}
tests:
  - ['\x00a0', ' ']

