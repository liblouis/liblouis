display: |
  include unicode-without-blank.dis
  display a a

# ----------------------------------
# 6-dot grade 0 (uncontracted)
# ----------------------------------

table:
  language: sv
  grade: 0
  __assert-match: sv-6g0.utb
flags: {testmode: bothDirections}
tests:
  - # Lowercase letters
    - a b c d e f g h i j k l m n o p q r s t u v w x y z
    - в Ғ в ғ в ү в ҷ в ‘ в Ӣ в ӣ в “ в Ҡ в ҡ в … в Ү в Қ в қ в • в Ҹ в ҹ в — в Һ в һ в Ҙ в § в ә в ӯ в Ҫ в ө
  - # Single digits
    - 1 2 3 4 5 6 7 8 9 0
    - в јв Ғ в јв ғ в јв ү в јв ҷ в јв ‘ в јв Ӣ в јв ӣ в јв “ в јв Ҡ в јв ҡ
  - # Capitalization
    - Hej!
    - в  в “в ‘в ҡв –
  - # All caps word
    - NHL
    - в  в  в қв “в Ү
  - # Mixed letters and numbers
    - 123abc
    - в јв Ғв ғв үв ұв Ғв ғв ү
  - # Decimal point
    - 10,35
    - в јв Ғв ҡв Ӯв үв ‘
  - # Number series
    - 192.168.0.1
    - в јв Ғв Ҡв ғв „в Ғв Ӣв “в „в ҡв „в Ғ
  - # Time
    - 15:35
    - в јв Ғв ‘в ’в јв үв ‘
  # Spaces
  - ['\x0020', ' ']
  - # Diacritic letters
    - ДҮ Г¬ Гі ЕЈ бә…
    - в ¬в ”в ү в ¬в ўв Ҡ в ¬в ”в • в Јв Ӯв һ в ¬в Ҷв ә
flags: {testmode: forward}
tests:
  - # Generic diacritic letters
    - Дғ Й– бёқ
    - в Ҳв Ғ в Ҳв ҷ в Ҳв ‘
  - ['\x0009', '\x0020']
  - ['\x000a', '\x0020']
  - ['\x000d', '\x0020']
  - ['\x00a0', ' ']
  # All caps phrase
  - ['VAD SГ„GER DU?', 'в  в  в  в §в Ғв ҷ в Һв ңв ӣв ‘в — в ҷв Ҙв ўв ұ']

# ----------------------------------
# grade 1 (partially contracted)
# ----------------------------------

table:
  language: sv
  grade: 1
  __assert-match: sv-6g1.ctb
flags: {testmode: bothDirections}
tests:
  - # Non-contraction letters
    - Nej s som i Sigurd.
    - в  в қв ‘в ҡ в ’в Һ в Һ в Ҡ в  в Һв Ҡв ӣв Ҙв —в ҷв „
flags: {testmode: forward}
tests:
  - # All caps phrase
    - VAD SГ„GER DU?
    - в  в  в  в ә в Һв ңв ӣв ‘в — в ҷв Ҙв ўв ұ

# ----------------------------------
# grade 2 (fully contracted)
# ----------------------------------

table:
  language: sv
  grade: 2
  __assert-match: sv-6g2.ctb
flags: {testmode: bothDirections}
tests:
  - # Part-word contraction
    - Han sa att de kunde ingenting.
    - в  в “ в Һв Ғ в Ғ в № в …в № в Ҡв Јв һв Ұв „
  - # Two-word contraction
    - Du kan till exempel gГҘ till affГӨren.
    - в  в ҷв Ҙ в … в һв Өв ‘в ӯ в ӣв Ў в һ в Ғв Ӣв Ӣв ңв —в ‘в қв „

# ----------------------------------
# 8-dot grade 0 (uncontracted) simplified
# ----------------------------------

table:
  language: sv
  dots: 8
  grade: 0
  version: simplified
  __assert-match: sv-8g0s.utb
flags: {testmode: bothDirections}
tests:
  - # Lowercase letters
    - a b c d e f g h i j k l m n o p q r s t u v w x y z
    - в Ғ в ғ в ү в ҷ в ‘ в Ӣ в ӣ в “ в Ҡ в ҡ в … в Ү в Қ в қ в • в Ҹ в ҹ в — в Һ в һ в Ҙ в § в ә в ӯ в Ҫ в ө
  - # Digits
    - 1 2 3 4 5 6 7 8 9 0
    - вўҒ вўғ вўү вўҷ вў‘ вўӢ вўӣ вў“ вўҠ вўҡ
  - # Capitalization
    - Hej!
    - вЎ“в ‘в ҡв –
  - # All caps word
    - NHL
    - вЎқвЎ“вЎҮ
flags: {testmode: forward}
tests:
  - # Diacritic letters
    - Дғ ДҮ Й– Г¬ Гі ЕЈ бә… бёқ
    - в Ҳв Ғ в Ҳв ү в Ів ҷ в Ҳв Ҡ в Ҳв • в Ҳв һ в Ҳв ә в Ҳв ‘

# ----------------------------------
# 8-dot grade 1 (partially contracted) simplified
# ----------------------------------

table:
  language: sv
  dots: 8
  grade: 1
  version: simplified
  __assert-match: sv-8g1s.ctb
flags: {testmode: bothDirections}
tests:
  - # One-letter contractions
    - och vad han har att vid
    - в ү в ә в “ в — в Ғ в §
  - # One-letter contractions with capital signs
    - Och Vad Han Har Att Vid
    - вЎү вЎә вЎ“ вЎ— вЎҒ вЎ§

# ----------------------------------
# 8-dot grade 2 (contracted) simplified
# ----------------------------------

table:
  language: sv
  dots: 8
  grade: 2
  version: simplified
  __assert-match: sv-8g2s.ctb
flags: {testmode: bothDirections}
tests:
  - # Two-letter contractions
    - hon allt endast mГҘste nГҘgra sjГӨlva tillbaka ingen bland annat
    - в “в қ в Ғв һ в ‘в Ғ в Қв і в қв ә в Һв ҡв Ғ в һв ғ в Ҡв Ј в ғв Үв Өв Ғ
  - # Multi-letter contractions with capital signs
    - Hon Allt Endast MГҘste NГҘgra SjГӨlva Tillbaka Ingen Bland annat
    - вЎ“в қ вЎҒв һ вЎ‘в Ғ вЎҚв і вЎқв ә вЎҺв ҡв Ғ вЎһв ғ вЎҠв Ј вЎғв Үв Өв Ғ

