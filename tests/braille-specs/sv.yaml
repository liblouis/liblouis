table:
  language: sv
  dots: 8
  grade: 0
  version: phonetics
  __assert-match: sv-8g0p.utb
flags: {testmode: bothDirections}
tests:
  - # Lowercase letters
    - a b c d e f g h i j k l m n o p q r s t u v w x y z
    - в Ғ в ғ в ү в ҷ в ‘ в Ӣ в ӣ в “ в Ҡ в ҡ в … в Ү в Қ в қ в • в Ҹ в ҹ в — в Һ в һ в Ҙ в § в ә в ӯ в Ҫ в ө
  - # Digits
    - 1 2 3 4 5 6 7 8 9 0
    - вўҒ вўғ вўү вўҷ вў‘ вўӢ вўӣ вў“ вўҠ вўҡ
  - # Phonetic and diacritic letters
    - Дғ ДҮ Й– Г¬ КҚ в—ҢМҖ Й« Й’ [
    - в ¬в °в Ғ в ¬в ”в ү в Ів ҷ в ¬в ўв Ҡ в –в ә в Ҳв Ў в –в Ү в –в Ў в ҳв ·
