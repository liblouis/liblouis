    - в†Љв†Б в†Љв†Г в†Љв†Й в†Љв†Щ в†Љв†С в†Љв†Л в†Љв†Ы в†Љв†У в†Љв†К в†Љв†Ъ
flags: {testmode: forward}
tests:
  - # Capitalization
    - Hej!
    - в††в†Ув†Св†Ъв†Ц
  - # All caps word
    - NHL
    - в††в††в†Эв†Ув†З
  - # Mixed letters and numbers
    - 123abc
    - в†Љв†Бв†Гв†Йв†±в†Бв†Гв†Й
  - # Decimal point
    - 10,35
    - в†Љв†Бв†Ъв†Вв†Йв†С
  - # Number series
    - 192.168.0.1
    - в†Љв†Бв†Кв†Гв†Дв†Бв†Лв†Ув†Дв†Ъв†Дв†Б
  - # Time
    - 15:35
