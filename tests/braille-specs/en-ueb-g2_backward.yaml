# Backtranslation emphasis detection tests
# These verify that emphasis indicators in braille are correctly detected
# and the typeform buffer is populated during backtranslation.
flags: {testmode: backward}
tests:
  # Single letter emphasis
  - [в Ёв Ҷв һв ‘в Һв һ, test, {typeform: {italic: '+   '}}]
  - [в ҳв Ҷв һв ‘в Һв һ, test, {typeform: {bold: '+   '}}]
  - [в ёв Ҷв һв ‘в Һв һ, test, {typeform: {underline: '+   '}}]

  # Word emphasis
  - [в Ёв Ӯв әв •в —в ҷв Ёв „, word, {typeform: {italic: '++++'}}]
  - [в ҳв Ӯв әв •в —в ҷв ҳв „, word, {typeform: {bold: '++++'}}]

  # Phrase emphasis
  - [в Ёв ¶в “в Ҡ в һв “в ‘в —в ‘в Ёв „, "hi there", {typeform: {italic: '++++++++'}}]

  # Mixed emphasis
  - [в Ғв Ёв Ҷв ғв ү, abc, {typeform: {italic: ' + '}}]

  # Nested emphasis - italic and bold on same word
  - - в Ёв Ӯв ҳв Ӯв һв ‘в Һв һв ҳв „в Ёв „
    - test
    - typeform:
        italic: '++++'
        bold: '++++'
