  - ["but,", в ғв Ӯ]
  - ["but.", в ғв І]
  - ["can,", в үв Ӯ]
  - ["do,", в ҷв Ӯ]
  # multi-letter contractions
  - ["about,", в Ғв ғв Ӯ]
  - ["about.", в Ғв ғв І]
  - ["above,", в Ғв ғв §в Ӯ]
  - ["above;", в Ғв ғв §в Ҷ]
  - ["above:", в Ғв ғв §в ’]
  - ["above.", в Ғв ғв §в І]
  - ["above!", в Ғв ғв §в –]
  - ["above?", в Ғв ғв §в Ұ]
  - ['above"', в Ғв ғв §в ҙ]
  - ['above."', в Ғв ғв §в Ів ҙ]

  # Make sure back-translation for words with "ea" after letters that
  # have contractions associated, such as words like meat, head and
  # others works properly.
  # See https://github.com/liblouis/liblouis/pull/350
  - ["meat", в Қв Ӯв һ]
  - ["head", в “в Ӯв ҷ]

  # #364: Whole word contractions followed by other contractions.
  # In this case, the whole word contraction should not apply.
  - [alone, в Ғв Үв җв •]
  - [bar, в ғв ң]
  - [ben, в ғв ў]
  - [Ben, в  в ғв ў]
  - [dance, в ҷв Ёв ‘]
  - [fence, в Ӣв °в ‘]
  - [her, в “в »]
  - [sand, в Һв Ҝ]
  - [sin, в Һв ”]
  - [sing, в Һв ¬]
  - [Sing, в  в Һв ¬]
  - [sof, в Һв ·]
  - [song, в Һв °в ӣ]
  - [thing, в №в ¬]

  # Issue #562 - "в ҹв …" erroneously back-translating as "quick's"
  - [quick, в ҹв …]

  # Issue #572: "в Ӣв Ң" erroneously back-translating as "first's"
  - [first, в Ӣв Ң]

  # Issue #572: "в ӯв „в Һ" erroneously back-translating as "x's"
  - ["it's", в ӯв „в Һ]
  - ["x's", в °в ӯв „в Һ]

  # According to issue #434 ':)' should be translated as в ’в җв ң (which
  # works) and backtranslation should translate it back to ':)' (which
  # doesn't work). See https://github.com/liblouis/liblouis/issues/434
  # and https://github.com/nvaccess/nvda/issues/7678
  - [":)", в ’в җв ң, xfail: {backward: true}]

  # Issue #1018: contraction of "there"
  - [there, в җв ®]
  - [There, в  в җв ®]
  - [a.there, в Ғв Ів җв ®]
  - [bb.there, в ғв ғв Ів җв ®]
  - ["1,there", в јв Ғв Ӯв һв “в ‘в —в ‘] # Numbers also set grade 1 mode

  # Issue #1029 (https://github.com/liblouis/liblouis/issues/1029): Unusable output for unknown characters
  # The following group of tests are characters not handled by the UEB table
  # note also the dots 12567 technically not allowed in a 6-dot table.
  - [\x201f, в „вЎів ӯв Ҷв ҙв Ӯв Ӣв „, {xfail: {backward: true}}] # reverse quote
