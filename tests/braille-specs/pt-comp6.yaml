  # Behavior Test of the Symbols in Phrases and Expressions

  - # Pamgrama | Pangram
    - "SГі juГӯza chata nГЈo vГӘ cГўmera frГЎgil e dГЎ kiwi Г  rГ© sexy que pГҙs aГ§Гөes em baГә."
    - "в Ёв Һв ¬ в ҡв Ҙв Ңв өв Ғ в үв “в Ғв һв Ғ в қв ңв • в §в Ј в үв Ўв Қв ‘в —в Ғ в Ӣв —в ·в ӣв Ҡв Ү в ‘ в ҷв · в …в Ҡв әв Ҡ в « в —в ҝ в Һв ‘в ӯв Ҫ в ҹв Ҙв ‘ в Ҹв №в Һ в Ғв Ҝв Әв ‘в Һ в ‘в Қ в ғв Ғв ҫв „"
  - # Iniciais maiГәsculas | Uppercase initials
    - "Iniciais MaiГәsculas"
    - "в Ёв Ҡв қв Ҡв үв Ҡв Ғв Ҡв Һ в Ёв Қв Ғв Ҡв ҫв Һв үв Ҙв Үв Ғв Һ"
  - # Duas palavras em caixa alta | Two words with all capital letters
    - "CAIXA ALTA"
    - "в Ёв Ёв үв Ғв Ҡв ӯв Ғ в Ёв Ёв Ғв Үв һв Ғ"
  - # Sigla com pontos entre letras | Acronym with dots between letters
    - "R.S.V.P."
    - "в Ёв —в „в Ёв Һв „в Ёв §в „в Ёв Ҹв „"
  - # MaiГәsculas entre minГәsculas e vice-versa | Uppercase letters between lowercase letters and vice-versa
    - "nomeDeUmaVariГЎvel, PcD, TESTEminГәsculasNoMEIOdeMAIГҡSCULAS"
    - "в қв •в Қв ‘в Ёв ҷв ‘в Ёв Ҙв Қв Ғв Ёв §в Ғв —в Ҡв ·в §в ‘в Үв Ӯ в Ёв Ҹв үв Ёв ҷв Ӯ в Ёв Ёв һв ‘в Һв һв ‘в °в Қв Ҡв қв ҫв Һв үв Ҙв Үв Ғв Һв Ёв қв •в Ёв Ёв Қв ‘в Ҡв •в °в ҷв ‘в Ёв Ёв Қв Ғв Ҡв ҫв Һв үв Ҙв Үв Ғв Һ"
  - # begcapsphrase/endcapsphrase test: Mais de 4 palavras em caixa alta | More than 4 words with all capital letters
    - "SEQUГҠNCIA COM MAIS DE QUATRO PALAVRAS EM CAIXA ALTA."
    - "в Ёв Ёв Ёв Һв ‘в ҹв Ҙв Јв қв үв Ҡв Ғ в үв •в Қ в Қв Ғв Ҡв Һ в ҷв ‘ в ҹв Ҙв Ғв һв —в • в Ҹв Ғв Үв Ғв §в —в Ғв Һ в ‘в Қ в үв Ғв Ҡв ӯв Ғ в Ёв Ёв Ғв Үв һв Ғв „"
    - xfail: "nГЈo implementado | not implemented"
  - # NГәmeros com letras e vice-versa | Numbers with letters and vice-versa
    - "1a, 2z, 3B, c4, D5, e6f, 7g8."
    - "в јв Ғв °в Ғв Ӯ в јв ғв өв Ӯ в јв үв Ёв ғв Ӯ в үв јв ҷв Ӯ в Ёв ҷв јв ‘в Ӯ в ‘в јв Ӣв °в Ӣв Ӯ в јв ӣв °в ӣв јв “в „"
  - # NГәmeros ordinais, e abreviaturas de palavras nГәmeros... | Ordinal numbers, and abbreviations of words numbers...
    - "30ВӘ, 70Вә; nВә, NВә, nВәs, NВәs."
    - "в јв үв ҡв ёв Ғв Ӯ в јв ӣв ҡв ёв •в Ҷ в қв ёв •в Ӯ в Ёв қв ёв •в Ӯ в қв ёв •в Һв Ӯ в Ёв қв ёв •в Һв „"
  - # Anos e datas | Years and dates
    - "1825, 04/10/1804, 1857-1869; 22-04-1500."
    - "в јв Ғв “в ғв ‘в Ӯ в јв ҡв ҷв Ів јв Ғв ҡв Ів јв Ғв “в ҡв ҷв Ӯ в јв Ғв “в ‘в ӣв Өв јв Ғв “в Ӣв Ҡв Ҷ в јв ғв ғв Өв јв ҡв ҷв Өв јв Ғв ‘в ҡв ҡв „"
  - # Intervalo de anos usando o caractere traГ§o ou meio traГ§o | Range of years using the en dash character
    - "1809вҖ“1852"
    - "в јв Ғв “в ҡв Ҡв Өв јв Ғв “в ‘в ғ"
    - xfail: {backward: "nГЈo retrotranscreve | not back-translate"}
  - # NГәmeros com separador de classes | Numbers with thousands separator
    - "10.000, 200.000; 3.000.000."
    - "в јв Ғв ҡв „в ҡв ҡв ҡв Ӯ в јв ғв ҡв ҡв „в ҡв ҡв ҡв Ҷ в јв үв „в ҡв ҡв ҡв „в ҡв ҡв ҡв „"
  - # NГәmeros decimais | Decimal numbers
    - "0,0; 00,99; 1,23; 45,6; 7,89012; 3456,7; 890.123,456789."
    - "в јв ҡв Ӯв ҡв Ҷ в јв ҡв ҡв Ӯв Ҡв Ҡв Ҷ в јв Ғв Ӯв ғв үв Ҷ в јв ҷв ‘в Ӯв Ӣв Ҷ в јв ӣв Ӯв “в Ҡв ҡв Ғв ғв Ҷ в јв үв ҷв ‘в Ӣв Ӯв ӣв Ҷ в јв “в Ҡв ҡв „в Ғв ғв үв Ӯв ҷв ‘в Ӣв ӣв “в Ҡв „"
  - # ГӮngulos e Temperaturas | Angles and Temperatures
    - "45В° vezes 8 = 360В°; calor de 32В°C ou 89,60В°F."
    - "в јв ҷв ‘в ҙ в §в ‘в өв ‘в Һ в јв “ в ¶ в јв үв Ӣв ҡв ҙв Ҷ в үв Ғв Үв •в — в ҷв ‘ в јв үв ғв ҙв Ёв ү в •в Ҙ в јв “в Ҡв Ӯв Ӣв ҡв ҙв Ёв Ӣв „"
  - # Alguns valores monetГЎrios | Some monetary values
    - "Em 2024, US$1 aproximadamente R$6,19 e 1вӮ¬ aproximadamente R$6,43."
    - "в Ёв ‘в Қ в јв ғв ҡв ғв ҷв Ӯ в Ёв Ёв Ҙв Һв Ҳв ҷв јв Ғ в Ғв Ҹв —в •в ӯв Ҡв Қв Ғв ҷв Ғв Қв ‘в қв һв ‘ в Ёв —в Ҳв ҷв јв Ӣв Ӯв Ғв Ҡ в ‘ в јв Ғв Ҳв ‘ в Ғв Ҹв —в •в ӯв Ҡв Қв Ғв ҷв Ғв Қв ‘в қв һв ‘ в Ёв —в Ҳв ҷв јв Ӣв Ӯв ҷв үв „"
  - # ГҒrea e volume simples | Simple area and volume
    - "Casa de 50 mВІ, tanque de 1 mВі."
