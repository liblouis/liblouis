display: unicode-without-blank.dis
table:
  language: lt
  dots: 6
  __assert-match: lt.utb
tests:
  - - Pangram
    - Д®linkdama fechtuotojo ЕЎpaga sublykДҚiojusi pragrДҷЕҫД— apvalЕі arbЕ«zД….
    - в Ёв Әв Үв Ҡв қв …в ҷв Ғв Қв Ғ в Ӣв ‘в үв “в һв Ҙв •в һв •в ҡв • в ®в Ҹв Ғв ӣв Ғ в Һв Ҙв ғв Үв Ҫв …в ©в Ҡв •в ҡв Ҙв Һв Ҡ в Ҹв —в Ғв ӣв —в ұв Јв ң в Ғв Ҹв §в Ғв Үв ¬ в Ғв —в ғв ів өв Ўв І
  - - Single digits
    - 1 2 3 4 5 6 7 8 9 0
    - в јв Ғ в јв ғ в јв ү в јв ҷ в јв ‘ в јв Ӣ в јв ӣ в јв “ в јв Ҡ в јв ҡ
  - - Quotation symbols
    - Programa вҖһWriterвҖң, programa "Notepad", sistema вҖңWordPressвҖқ
    - в Ёв Ҹв —в •в ӣв —в Ғв Қв Ғ в Ұв Ёв әв —в Ҡв һв ‘в —в ҙв Ӯ в Ҹв —в •в ӣв —в Ғв Қв Ғ в °в Ёв қв •в һв ‘в Ҹв Ғв ҷв °в Ӯ в Һв Ҡв Һв һв ‘в Қв Ғ в ҙв Ёв әв •в —в ҷв Ёв Ҹв —в ‘в Һв Һв °
  - - Punctuation and other symbols
    - '= ! + - _ | \\ / [ ] { } ( ) '' " вҖһ вҖң # % ^ & * ~ , ? < > $ ВЈ @ ; : В° В§ .'
    - в Ҳв ¶ в – в Ҳв – в Ө в № в җв ё в җв Ң в Ң в · в ҫ в җв · в җв ҫ в ¶ в җв ¶ в „ в ° в Ұ в ҙ в җв ј в ҝ в җв І в Ҝ в ” в » в Ӯ в ў в җв Ә в җв • в Ҳв Ё в Ҳв Ү в җв ң в Ҷ в ’ в Ҳв ҙ в җв ¬ в І
  - - Dashes and hyphens # Not very visible, but the first and third dashes are en-dashes, the last one is em-dash.
    - VilniusвҖ“Kaunas; lopЕЎelis-darЕҫelis; 1992вҖ“1995 m.; вҖ” Rimas
    - в Ёв §в Ҡв Үв қв Ҡв Ҙв Һв  в Өв Ёв …в Ғв Ҙв қв Ғв Һв Ҷ в Үв •в Ҹв ®в ‘в Үв Ҡв Һв Өв ҷв Ғв —в Јв ‘в Үв Ҡв Һв Ҷ в јв Ғв Ҡв Ҡв ғв  в Өв јв Ғв Ҡв Ҡв ‘ в Қв Ів Ҷ в Ө в Ёв —в Ҡв Қв Ғв Һ
  - - Comma, colon, or full stop should not cancel numeric mode.
    - 123.123 123,123 123:123
    - в јв Ғв ғв үв Ів Ғв ғв ү в јв Ғв ғв үв Ӯв Ғв ғв ү в јв Ғв ғв үв ’в Ғв ғв ү
  - - Comma, colon, or full stop should not start numeric mode either.
    - abc.123 abc,123 abc:123 abc:abc .123 ,123 :123
    - в Ғв ғв үв Ів јв Ғв ғв ү в Ғв ғв үв Ӯв јв Ғв ғв ү в Ғв ғв үв ’в јв Ғв ғв ү в Ғв ғв үв ’в Ғв ғв ү в Ів јв Ғв ғв ү в Ӯв јв Ғв ғв ү в ’в јв Ғв ғв ү
  - - Letters a-j need nocontractsign to cancel numeric mode.
    - 123abc 123,abc 123.abc 123:abc
    - в јв Ғв ғв үв  в Ғв ғв ү в јв Ғв ғв үв Ӯв  в Ғв ғв ү в јв Ғв ғв үв Ів  в Ғв ғв ү в јв Ғв ғв үв ’в  в Ғв ғв ү
  - - Letters a-j DO NOT need nocontractsign when numeric mode is not in effect.
    - 123 a b c
    - в јв Ғв ғв ү в Ғ в ғ в ү
  - - Capital letters, letters outside a-j and other characters except .:, automatically cancel numeric mode and don't need nocontractsign.
    - 123ABCabc 123Aabc 123kabc 123;abc
    - в јв Ғв ғв үв ҳв Ғв ғв үв  в Ғв ғв ү в јв Ғв ғв үв Ёв Ғв Ғв ғв ү в јв Ғв ғв үв …в Ғв ғв ү в јв Ғв ғв үв Ҷв Ғв ғв ү
  - - Numbers and any non-letters automaticaly cancel uppercase mode and don't need endcapsword.
    - ABC1abc ABC;abc
    - в ҳв Ғв ғв үв јв Ғв  в Ғв ғв ү в ҳв Ғв ғв үв Ҷв Ғв ғв ү

