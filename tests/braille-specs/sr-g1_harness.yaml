display: unicode-without-blank.dis
table:
  language: sr
  grade: 1
  __assert-match: sr.tbl # sr-g1.ctb
flags: {testmode: bothDirections}
tests:
  - [WILDCARD, в ҳв әв Ҡв Үв ҷв үв Ғв —в ҷ] # tested buggy behavior
  - [-, в Ө] # same thing again
  # common punctuation test
  - - '!"#$%&/()=?*\\|Г·Г—[]ВӨ@{}В§<>вӮ¬+'''
    - в –в ¶в јв Ів јв ҡв ҙв Ҳв Ҝв Ңв ¶в ¶в ¶в ўв Өв Ўв Ҳв Үв ів ҳв ’в ¶в „в  в ¶в ¶в §в ¶в ңв ¶в Ҷв °в ¶в ¬в җв Әв •в Ӯв ўв –в „
    - {xfail: true}
  # alphabet test (including diacritics) latin script only
  - [qwertzuiopЕЎД‘asdfghjklДҚДҮЕҫyxcvbnm, в ҹв әв ‘в —в һв өв Ҙв Ҡв •в Ҹв ұв №в Ғв Һв ҷв Ӣв ӣв “в ҡв …в Үв Ўв ©в ®в Ҫв ӯв үв §в ғв қв Қ]
  # special syllables /digraphs
  - [dЕҫ lj nj DЕҫ Lj Nj DЕҪ LJ NJ, в » в Ј в « в Ёв » в Ёв Ј в Ёв « в ҳв » в ҳв Ј в ҳв «]
  # letters and numbers
  - [abc123, в Ғв ғв үв јв Ғв ғв ү]
  # numbers and letters
  - [123abc, в јв Ғв ғв үв Ғв ғв ү, xfail: {backward: true}]
  # cyrillic letters, assuming that cyrillic script works tested on a braille display
  - [СҷСҡРөСҖСӮР·СғРёРҫРҝСҲС’Р°СҒРҙС„РіС…СҳРәР»СҮСӣР¶СҹСҶРІРұРҪРј, в Јв «в ‘в —в һв өв Ҙв Ҡв •в Ҹв ұв №в Ғв Һв ҷв Ӣв ӣв “в ҡв …в Үв Ўв ©в ®в »в үв §в ғв қв Қ, xfail: {backward: true}]
  # fixed buggy behavior of the letter u
  - [u, в Ҙ]
