display: unicode.dis
table:
  language: it
  type: literary
  __assert-match: it.tbl # it-it-comp6.utb
flags: {testmode: bothDirections}
tests:

  # --- ALPHABET ---
  - [a, ⠁]
  - [b, ⠃]
  - [c, ⠉]
  - [d, ⠙]
  - [e, ⠑]
  - [f, ⠋]
  - [g, ⠛]
  - [h, ⠓]
  - [i, ⠊]
  - [j, ⠚]
  - [k, ⠅]
  - [l, ⠇]
  - [m, ⠍]
  - [n, ⠝]
  - [o, ⠕]
  - [p, ⠏]
  - [q, ⠟]
  - [r, ⠗]
  - [s, ⠎]
  - [t, ⠞]
  - [u, ⠥]
  - [v, ⠧]
  - [w, ⠺]
  - [x, ⠭]
  - [y, ⠽]
  - [z, ⠵]

  # --- WORDS AND ACCENTS ---
  - [mamma, ⠍⠁⠍⠍⠁]
  - [città, ⠉⠊⠞⠞⠷]
  - [perché, ⠏⠑⠗⠉⠓⠿]
  - [virtù, ⠧⠊⠗⠞⠾]
  - [però, ⠏⠑⠗⠬]
  - [lunedì, ⠇⠥⠝⠑⠙⠌]

  # --- SYMBOLS ---
  - ["[testo]", ⠈⠷⠞⠑⠎⠞⠕⠈⠾]
  - ["(parentesi)", ⠢⠏⠁⠗⠑⠝⠞⠑⠎⠊⠔]
  - ["{graffe}", ⠈⠯⠛⠗⠁⠋⠋⠑⠈⠽]

  # --- MATH AND NUMBERS ---
  - [10, ⠼⠁⠚]
  - ["10,5", ⠼⠁⠚⠂⠼⠑]
  - [10-10, ⠼⠁⠚⠤⠼⠁⠚]

# SEZIONE TABELLA 8 PUNTI
table:
  language: it
  type: computer
  __assert-match: it-it-comp8.utb
flags: {testmode: bothDirections}
tests:
  # see https://github.com/liblouis/liblouis/issues/1783
  - - "hello"
    - "⠓⠑⠇⠇⠕"
    - xfail: {backward: received "ἑllo"}
