display: |
  include unicode-without-blank.dis
  display 9 9
  display a a
table:
  language: it
  type: literary
  __assert-match: it-it-comp6.utb
flags: {testmode: bothDirections}
tests:

  # --- ALPHABET ---
  - [a, ⠁]
  - [b, ⠃]
  - [c, ⠉]
  - [d, ⠙]
  - [e, ⠑]
  - [f, ⠋]
  - [g, ⠛]
  - [h, ⠓]
  - [i, ⠊]
  - [j, ⠚]
  - [k, ⠅]
  - [l, ⠇]
  - [m, ⠍]
  - [n, ⠝]
  - [o, ⠕]
  - [p, ⠏]
  - [q, ⠟]
  - [r, ⠗]
  - [s, ⠎]
  - [t, ⠞]
  - [u, ⠥]
  - [v, ⠧]
  - [w, ⠺]
  - [x, ⠭]
  - [y, ⠽]
  - [z, ⠵]

  # --- WORDS AND ACCENTS ---
  - [mamma, ⠍⠁⠍⠍⠁]
  - [città, ⠉⠊⠞⠞⠷]
  - [perché, ⠏⠑⠗⠉⠓⠿]
  - [virtù, ⠧⠊⠗⠞⠾]
  - [però, ⠏⠑⠗⠬]
  - [lunedì, ⠇⠥⠝⠑⠙⠌]
  - ['È bello', '⠨⠮ ⠃⠑⠇⠇⠕']

  # --- SYMBOLS ---
  - ["[testo]", ⠈⠷⠞⠑⠎⠞⠕⠈⠾]
  - ["(parentesi)", ⠢⠏⠁⠗⠑⠝⠞⠑⠎⠊⠔]
  - ["{graffe}", ⠈⠯⠛⠗⠁⠋⠋⠑⠈⠽]

  # --- MATH AND NUMBERS ---
  - [10, ⠼⠁⠚]
  - ["10,5", ⠼⠁⠚⠂⠼⠑]
  - [10-10, ⠼⠁⠚⠤⠼⠁⠚]

  # --- SPACES ---
  - ['\x0020', '\x0020']
  - ['\x00a0', 'a']
  - ['\x0009', '9']

# SEZIONE TABELLA 8 PUNTI
table:
