  - [hé, ⠓⢿]
  - [vh, ⠧⠓]
  - ['\x007Dh', '⠾⠓']
  - [caffè, ⠉⠁⠋⠋⢮]
  - [soffio, ⠎⠕⠋⠋⠊⠕]

