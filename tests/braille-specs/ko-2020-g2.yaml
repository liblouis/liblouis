# Tests for Korean Grade 2 Braille (2020 한글점자규정)
# Reference: 문화체육관광부 고시 제2020-38호
# Validated against: NIKL Korean Braille Corpus
#   (국립국어원 한국어-점자 병렬 말뭉치 2022)

display: unicode-without-blank.dis
table:
  language: ko
  grade: 2
  version: 2020
  __assert-match: ko-2020-g2.ctb

tests:
  # Basic syllables (제8항: 초성+중성+종성)
  - - "가"
    - "⠫"
  - - "한"
    - "⠚⠒"
  - - "글"
    - "⠈⠮"
  - - "점"
    - "⠨⠎⠢"
  - - "자"
    - "⠨"

  # Onset+ㅏ abbreviation (제15항)
  - - "가을"
    - "⠫⠮"
  - - "나라"
    - "⠉⠐⠣"
  - - "바다"
    - "⠘⠊"
  - - "사람"
    - "⠇⠐⠣⠢"
  - - "하늘"
    - "⠚⠉⠮"
  - - "카드"
    - "⠋⠊⠪"

  # VC abbreviation (제16항)
  - - "억울"
    - "⠹⠯"
  - - "언어"
    - "⠾⠎"
  - - "영어"
    - "⠻⠎"
  - - "운동"
    - "⠛⠊⠿"
  - - "은행"
    - "⠵⠚⠗⠶"
  - - "인간"
    - "⠟⠫⠒"

  # ㅇ onset omission (제9항)
  - - "이동"
    - "⠕⠊⠿"
  - - "안녕"
    - "⠣⠒⠉⠻"
  - - "우리"
    - "⠍⠐⠕"

  # No abbreviation before ㅇ-onset (제17항)
  - - "나이"
    - "⠉⠣⠕"
  - - "다음"
    - "⠊⠣⠪⠢"
  - - "바위"
    - "⠘⠣⠍⠗"
  - - "자아"
    - "⠨⠣⠣"
  - - "하얀"
    - "⠚⠣⠜⠒"
  - - "마을"
    - "⠑⠣⠮"

  # 것/껏 abbreviation (제12항, 제14항)
  - - "것"
    - "⠸⠎"
  - - "것이"
    - "⠸⠎⠕"

  # Word abbreviation (제18항)
  - - "그래서"
    - "⠁⠎"
  - - "그러나"
    - "⠁⠉"
  - - "그러면"
    - "⠁⠒"
  - - "그러므로"
    - "⠁⠢"
  - - "그런데"
    - "⠁⠝"
  - - "그리고"
    - "⠁⠥"
  - - "그리하여"
    - "⠁⠱"
  - - "그러면서"
    - "⠁⠒⠠⠎"

  # Compound coda + VC abbreviation
  - - "넓은"
    - "⠉⠞⠃⠵"
  - - "겪고"
    - "⠈⠱⠁⠁⠈⠥"
  - - "읽다"
    - "⠕⠂⠁⠊"

  # Doubled onset (제13항)
  - - "까지"
    - "⠠⠫⠨⠕"
  - - "따라"
    - "⠠⠊⠐⠣"
  - - "빠른"
    - "⠠⠘⠐⠵"
  - - "싸움"
    - "⠠⠇⠍⠢"

  # Vowel separator (제10항)
  - - "아예"
    - "⠣⠤⠌"
  - - "유예"
    - "⠩⠤⠌"

  # Real-world words (NIKL corpus)
  - - "대한민국"
    - "⠊⠗⠚⠒⠑⠟⠈⠍⠁"
  - - "안녕하세요"
    - "⠣⠒⠉⠻⠚⠠⠝⠬"
  - - "서울"
    - "⠠⠎⠯"
  - - "한글"
    - "⠚⠒⠈⠮"
  - - "학생"
    - "⠚⠁⠠⠗⠶"
  - - "바이러스"
    - "⠘⠣⠕⠐⠎⠠⠪"
  - - "대통령"
    - "⠊⠗⠓⠿⠐⠻"
  - - "경제"
    - "⠈⠻⠨⠝"
  - - "정부"
    - "⠨⠻⠘⠍"

